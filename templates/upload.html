<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: #333;
        }

        .navbar {
            background: #0f172a;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        .upload-box {
            text-align: center;
            margin-bottom: 30px;
        }

        input[type="file"] {
            margin-right: 10px;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .upload-btn {
            background: #2563eb;
            color: white;
        }

        .download { color: green; }
        .encrypted { color: orange; }
        .delete { color: red; }
        .share-btn {
            background: #1e293b;
            color: white;
            margin-left: 10px;
        }

        .file-card {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .file-actions a {
            margin-right: 10px;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div>🔐 Secure File Sharing</div>
    <div>
        <a href="/upload">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <h2>📁 Upload File</h2>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button class="upload-btn">Upload Securely</button>
        </form>
    </div>

    <h3>Your Files</h3>

    {% for file in files %}
    <div class="file-card">
        <b>{{ file.original }}</b><br>
        <small>{{ file.size }} KB | {{ file.time }}</small>

        <div class="file-actions">
            <a class="download" href="/download/{{ file.name }}">Download</a>
            <a class="encrypted" href="/download_encrypted/{{ file.name }}">Encrypted</a>
            <a class="delete" href="/delete/{{ file.name }}">Delete</a>

            <button class="share-btn"
                onclick="copyLink('{{ request.host_url }}share/{{ file.file_id }}')">
                Share
            </button>
        </div>
    </div>
    {% endfor %}

</div>

<script>
function copyLink(link) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(link);
    } else {
        const temp = document.createElement("input");
        temp.value = link;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
    }

    alert("Link copied:\n" + link);
}
</script>

</body>
</html>
