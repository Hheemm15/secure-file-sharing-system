<!DOCTYPE html>
<html>
<head>
    <title>Secure File Sharing</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .navbar {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: right;
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: 700px;
            margin: 40px auto;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
        }

        .upload-box {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .message {
            text-align: center;
            color: green;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            background: #f4f6f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .file-info {
            font-size: 13px;
            color: gray;
        }

        .actions a {
            margin-left: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .download {
            color: green;
        }

        .delete {
            color: red;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/upload">Dashboard</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">

    <h2>🔐 Secure File Sharing System</h2>

    <!-- Flash -->
    {% with messages = get_flashed_messages() %}
      {% for msg in messages %}
        <p class="message">{{ msg }}</p>
      {% endfor %}
    {% endwith %}

    <!-- Upload -->
    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file">
            <br>
            <button type="submit">Upload Securely</button>
        </form>
    </div>

    <!-- Files -->
    <div class="file-list">
        <h3>Your Files</h3>

        {% for file in files %}
        <div class="file-item">
            <div>
                <strong>{{ file.name }}</strong>
                <div class="file-info">
                    {{ file.size }} KB | {{ file.time }}
                </div>
            </div>

            <div class="actions">
                <a href="/download/{{ file.name }}">Download</a>
                <a href="/download_encrypted/{{ file.name }}">Encrypted</a>
                <a href="/delete/{{ file.name }}">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
